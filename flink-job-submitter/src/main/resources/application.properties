# Flink Analytics Configuration
# 
# This file contains configuration for the Flink stream processing job.
# These values are loaded by JobComponents to configure Kafka connectivity
# and Flink runtime settings.
# 
# Flink Configuration Philosophy:
# - Checkpointing: Enabled for exactly-once semantics (job can restart from checkpoint)
# - Watermark tolerance: 60 seconds (events up to 60s late are handled)
# - Topic names: Match the contracts defined in specs/002-flink-stream-analytics/contracts/

# ============================================================================
# Kafka Connectivity
# ============================================================================

# Kafka broker address (hostname:port) - must match docker-compose network
kafka.bootstrap.servers: broker:29092

# Confluent Schema Registry URL - manages Avro schemas centrally
# Schema Registry avoids embedding schemas in each message (saves bandwidth)
# and provides schema evolution support
kafka.schema.registry.url: http://schema-registry:8081

# ============================================================================
# Flink Source (Input)
# ============================================================================

# Kafka topic to consume order events from
flink.source.topic: order.placed

# Consumer group ID - this identifies the Flink job to Kafka
# Kafka tracks offsets per group, so restarting Flink resumes where it left off
# Format: group ID determines offset management
flink.source.group.id: flink-analytics-consumer

# ============================================================================
# Flink Sink (Output)
# ============================================================================

# Kafka topic to emit aggregated metrics to
flink.sink.topic: order.analytics

# ============================================================================
# Flink Runtime
# ============================================================================

# Checkpoint interval in milliseconds (60 seconds)
# How often Flink creates a consistent snapshot
# Trade-off: More frequent = less reprocessing on failure, but more overhead
flink.checkpoint.interval: 60000

# Watermark interval in milliseconds (1000ms = 1 second)
# How often Flink emits watermarks to advance event time progress
# This triggers window firing when watermark passes window end
flink.watermark.interval: 1000

# Watermark tolerance in seconds (60 seconds)
# Events arriving within this late window are included in windows
# Events later than this are considered late and dropped/side-output
flink.watermark.tolerance.seconds: 60

# Stream idleness timeout in minutes (1 minute)
# If no events for this duration, stream marked as idle
# Allows watermark progress despite backpressure/gaps
flink.stream.idleness.minutes: 1

# Window size in minutes (1 minute)
# Size of tumbling windows for aggregation
# Valid values: 1 (1-minute), 60 (1-hour), 1440 (24-hour)
flink.window.size.minutes: 1